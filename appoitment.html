<!DOCTYPE html>
<html>

<head>
<title>Saengil-date-confirmation 🎂</title>
<link rel="icon" type="image/png" href="icon.png">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;

background-image:url("between-us.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

overflow:hidden;
}

.container{
background:white;
padding:45px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
text-align:center;
width:370px;
position:relative;
z-index:2;
}

h2{
color:#ff4d6d;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.yes{
background:#ff4d6d;
color:white;
}

.no{
background:#888;
color:white;
position:relative;
}

.confirm{
background:#ff4d6d;
color:white;
width:100%;
}

button:hover{
transform:scale(1.08);
}

select,input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

#dateSection{
display:none;
}

#result{
margin-top:20px;
font-weight:bold;
color:#ff4d6d;
}

/* floating hearts */

.heart{
position:absolute;
bottom:-50px;
font-size:20px;
animation:float 6s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:0.7;
}
100%{
transform:translateY(-100vh);
opacity:0;
}
}
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:10;
}

.popup-content{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
width:300px;
animation:fadeIn 0.4s;
}

@keyframes fadeIn{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

</style>

</head>

<body>

<div class="container">

<h2>  BIRTHDAY BOY INCOMING ❤️</h2>
<h2> Will you make a little time to celebrate with me? </h2>

<button class="yes" onclick="yesClick()">Yes 💖</button>
<button class="no"  onclick="noClick()">No 🙈</button>

<div id="dateSection">

<h3>Please choose a time that you are available for me 💌</h3>

<select id="date">
<option value="">Select Date</option>
<option value="30/3/26">30 March 2026 (MONDAY)</option>
<option value="31/3/26">31 March 2026 (TUESDAY)</option>
</select>

<select id="time">
<option value="">Select Time</option>
<option value="6:30 PM">6:30 PM</option>
<option value="7:00 PM">7:00 PM</option>
</select>

<button class="confirm" onclick="confirmBooking()">Confirm Date ❤️</button>

</div>

<div id="result"></div>

</div>
<div id="popup" class="popup">

<div class="popup-content">

<h2>💖 Our little moment is set!</h2>

<p id="popupDetails"></p>

<p><strong>📍 Venue: Warakuya Japanese Garden Sutera</strong></p>
<a href="https://maps.google.com/?q=Warakuya+Japanese+Garden+Sutera" target="_blank">
Open Location in google map
</a>

<br><br>
<button onclick="closePopup()">Close</button>

</div>

</div>
<script>

function yesClick(){
document.getElementById("dateSection").style.display="block";
}

function noClick(){
alert("Opsss, you have no choice to say no, please choose a date!")
document.getElementById("dateSection").style.display="block";

}

function confirmBooking(){

var date=document.getElementById("date").value;
var time=document.getElementById("time").value;

if(date=="" || time==""){
alert("You must choose a time with me 😝");
return;
}

var appointment=date+" at "+time;

localStorage.setItem("appointment",appointment);



document.getElementById("popupDetails").innerHTML =
date + " at " + time + "<br>Can't wait to celebrate your special day! 🎂";
document.getElementById("popup").style.display="flex";

}

/* floating hearts */

setInterval(function(){

var heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="🎂";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},500);

</script>

</body>

</html>
